<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Add Employee</h5>
        </div>

        <div class="card-body">

            <form #empForm="ngForm" (ngSubmit)="submit(empForm)">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label>Employee ID</label>
                        <input type="number" class="form-control" [(ngModel)]="employee.employeeId" name="employeeId"
                            required #employeeId="ngModel">
                        <div class="text-danger small" *ngIf="employeeId.invalid && employeeId.touched">
                            Employee ID is required
                        </div>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Employee Name</label>
                        <input type="text" class="form-control" [(ngModel)]="employee.employeeName" name="employeeName"
                            required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Date of Birth</label>
                        <input type="date" class="form-control" [(ngModel)]="employee.dateOfBirth" name="dateOfBirth"
                            required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Contact Number</label>
                        <input type="text" class="form-control" [(ngModel)]="employee.contactNumber"
                            name="contactNumber" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>State</label>
                        <select class="form-select" [(ngModel)]="employee.state" name="state" required>
                            <option value="">Select State</option>
                            @for (s of states; track s) {
                            <option [value]="s">{{ s }}</option>
                            }

                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>City</label>
                        <select class="form-select" [(ngModel)]="employee.city" name="city" required>
                            <option value="">Select City</option>
                            @for (c of cities; track c) {
                            <option [value]="c">{{ c }}</option>
                            }

                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Designation</label>
                        <input type="text" class="form-control" [(ngModel)]="employee.designation" name="designation">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Joining Date</label>
                        <input type="date" class="form-control" [(ngModel)]="employee.joiningDate" name="joiningDate">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Monthly Salary</label>
                        <input type="number" class="form-control" [(ngModel)]="employee.monthlySalary"
                            name="monthlySalary">
                    </div>

                    <div class="col-12 mb-3">
                        <label>Address Line 1</label>
                        <input type="text" class="form-control" [(ngModel)]="employee.address.addressLine1"
                            name="addressLine1">
                    </div>

                    <div class="col-9 mb-3">
                        <label>Address Line 2</label>
                        <input type="text" class="form-control" [(ngModel)]="employee.address.addressLine2"
                            name="addressLine2">
                    </div>
                    <div class="col-3 mb-3">
                        <label>Pin Code</label>
                        <input type="text" class="form-control" [(ngModel)]="employee.address.pinCode" name="pinCode">
                    </div>

                </div>

                <div class="d-flex justify-content-end gap-2">
                    <button type="button" class="btn btn-secondary" (click)="cancel()"><i class="bi bi-x-square"></i>
                        Cancel</button>

                    <button type="submit" class="btn btn-success" [disabled]="empForm.invalid">
                        <i class="bi bi-floppy-fill"></i>
                        {{ isEditMode ? 'Update Employee' : 'Add Employee' }}
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>
